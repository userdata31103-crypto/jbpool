<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Announcements</title><style>

body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
padding:15px;
}

h2{
text-align:center;
color:#facc15;
margin-bottom:20px;
}

.back-btn{
display:block;
background:#22c55e;
color:white;
text-decoration:none;

}

.announcement-card{

background:#1e293b;

padding:15px;

border-radius:12px;

0 0 10px rgba(250,204,21,.2);

}

</style></head><body><a href="dashboard.html"
class="back-btn">

⬅ Back Dashboard

</a><h2>
📢 Announcements
</h2><div id="announcementList">Loading...

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDqzr44aj7ikUquk4Fp7WeYxwIVFX0-NkI",

authDomain: "ib-pool.firebaseapp.com",

projectId: "ib-pool",

storageBucket: "ib-pool.firebasestorage.app",

messagingSenderId: "930921732786",

appId: "1:930921732786:web:2eab7b97f307c25ac507ab"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const snap =
await getDocs(
collection(db,"announcements")
);
localStorage.setItem(
"seenAnnouncements",
snap.size
);
let html = "";

snap.forEach(docSnap=>{

const data =
docSnap.data();

html += `

<div class="announcement-card">

📢 ${data.message}

</div>

`;

});

document.getElementById(
"announcementList"
).innerHTML =

html ||

"No Announcements Found";

</script></body></html>
