<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB POOL - Sign Up</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
min-height:100vh;
padding:20px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#b266ff;
margin:20px 0 40px;
}

.form{
max-width:500px;
margin:auto;
}

label{
display:block;
margin:15px 0 8px;
color:#ddd;
}

input,select{
width:100%;
padding:15px;
background:#111;
border:2px solid #7b2cff;
border-radius:15px;
color:white;
outline:none;
}

.row{
display:flex;
gap:10px;
}

.row select{
width:40%;
}

.row input{
width:60%;
}

.signup-btn{
width:100%;
margin-top:25px;
padding:16px;
background:#7b2cff;
border:none;
border-radius:15px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
.bottom-text{
  text-align:center;
  margin-top:20px;
  color:#cccccc;
  font-size:14px;
}

.bottom-text a{
  color:#b266ff;
  text-decoration:none;
  font-weight:bold;
}

.bottom-text a:hover{
  text-decoration:underline;
}
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  width:90%;
  max-width:350px;
  background:#111;
  border:2px solid #b266ff;
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow:0 0 25px #b266ff;
}

.popup-box h2{
  color:#b266ff;
  margin-bottom:10px;
}

.popup-box p{
  color:white;
  margin-bottom:20px;
}

.popup-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#7b2cff,#b266ff);
  color:white;
  font-size:16px;
  font-weight:bold;
}
</style></head><body><div class="logo">JB POOL</div><div class="form">
  <label>Username*</label>
<input type="text" id="username" placeholder="Enter Username"><label>Password*</label>
<input type="password" id="password" placeholder="Please enter password">

<label>Please re-enter your password*</label>
<input type="password" id="confirmPassword" placeholder="Please re-enter your password">

<label>Mobile no.*</label>

<div class="row">
<select>
  <option value="+1">🇺🇸 +1 USA</option>
  <option value="+44">🇬🇧 +44 UK</option>
  <option value="+92">🇵🇰 +92 Pakistan</option>
  <option value="+91">🇮🇳 +91 India</option>
  <option value="+971">🇦🇪 +971 UAE</option>
  <option value="+966">🇸🇦 +966 Saudi Arabia</option>
  <option value="+974">🇶🇦 +974 Qatar</option>
  <option value="+968">🇴🇲 +968 Oman</option>
  <option value="+973">🇧🇭 +973 Bahrain</option>
  <option value="+965">🇰🇼 +965 Kuwait</option>
  <option value="+880">🇧🇩 +880 Bangladesh</option>
  <option value="+94">🇱🇰 +94 Sri Lanka</option>
  <option value="+86">🇨🇳 +86 China</option>
  <option value="+81">🇯🇵 +81 Japan</option>
  <option value="+61">🇦🇺 +61 Australia</option>
  <option value="+49">🇩🇪 +49 Germany</option>
  <option value="+33">🇫🇷 +33 France</option>
  <option value="+39">🇮🇹 +39 Italy</option>
  <option value="+7">🇷🇺 +7 Russia</option>
  <option value="+90">🇹🇷 +90 Turkey</option>
</select>
<input type="text" id="mobile" placeholder="Enter Mobile No.">
</div><label>Email*</label>
<input type="email" id="email" placeholder="Please enter your email">
</div><label>Referral code*</label>
<input type="text" id="referralCode" placeholder="Please enter Referral Code">

<button class="signup-btn">
SIGN UP
</button></div></body>
<div class="bottom-text">
  Already have an account?
  <a href="login.html">Login</a>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqzr44aj7ikUquk4Fp7WeYxwIVFX0-NkI",
  authDomain: "ib-pool.firebaseapp.com",
  projectId: "ib-pool",
  storageBucket: "ib-pool.firebasestorage.app",
  messagingSenderId: "930921732786",
  appId: "1:930921732786:web:2eab7b97f307c25ac507ab"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
window.onload = () => {

const urlParams = new URLSearchParams(window.location.search);
const refCode = urlParams.get("ref");

if(refCode){
document.getElementById("referralCode").value = refCode;
}

};
document.querySelector(".signup-btn").addEventListener("click", async () => {

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const referralCode = document.getElementById("referralCode").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!username || !email || !mobile || !password || !confirmPassword) {
    alert("Please fill all required fields");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  try {

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    await setDoc(
      doc(db, "users", userCredential.user.uid),
      {
        username: username,
        email: email,
        mobile: mobile,
        myReferralCode: userCredential.user.uid.substring(0,6).toUpperCase(),
referredBy: referralCode,
balance: 0,
        uid: userCredential.user.uid,
        createdAt: new Date().toISOString()
      }
    );


    document.getElementById("successPopup").style.display = "flex";

  } catch (error) {

    alert(error.message);
    console.error(error);

  }

});
document.getElementById("continueBtn")
?.addEventListener("click", () => {
  window.location.href = "login.html";
});


</script>
<div id="successPopup" class="popup" style="display:none;">
  <div class="popup-box">
    <h2>🎉 Welcome to JB POOL</h2>
    <p>Your account has been created successfully.</p>
    <button id="continueBtn">Continue</button>
  </div>
</div>
</body>

</html>
